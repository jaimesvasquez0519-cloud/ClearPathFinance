version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: clearpath-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: clearpath
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clearpath-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
